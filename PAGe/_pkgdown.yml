url: https://lennon-li.github.io/PAGe/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#1e5f8e"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Sans 3"}
    code_font: {google: "Source Code Pro"}

navbar:
  structure:
    left: [home, intro, articles, reference]
    right: [github]
  components:
    home:
      text: Home
      href: index.html
    intro:
      text: Get started
      href: articles/intro.html
    articles:
      text: Articles
      menu:
        - text: Pipeline overview
          href: articles/pipeline-overview.html
        - text: Pipeline walkthrough
          href: articles/pipeline-walkthrough.html
        - text: Prospective deployment
          href: articles/prospective-deployment.html
        - text: M0 ignition training
          href: articles/ignition-training.html
        - text: M2 forecast training
          href: articles/forecast-training.html
        - text: Source map
          href: articles/source-map.html

articles:
  - title: Architecture and use
    navbar: ~
    contents:
      - intro
      - matches("^articles/pipeline-overview$")
      - matches("^articles/pipeline-walkthrough$")
      - matches("^articles/prospective-deployment$")
  - title: Model development
    contents:
      - matches("^articles/ignition-training$")
      - matches("^articles/forecast-training$")
  - title: Developer reference
    contents:
      - matches("^articles/source-map$")

reference:
  - title: Data and simulation
    desc: Load, validate, and simulate surveillance data.
    contents:
      - load_flu_hist
      - getCurrentD
      - simulate_flu_seasons
      - checkSeasonLength
      - resolve_week_override
  - title: Build and train
    desc: Construct model stages and assemble a deployment kit.
    contents:
      - build_m0
      - build_m1
      - build_m2
      - train_m2
      - assemble_kit
  - title: Tune and specify
    desc: Tune model stages and create model specifications.
    contents:
      - tune_m0
      - tune_m1
      - tune_m1_alignment
      - default_m1_grid
      - default_m2_grid
      - m1_make_params
      - stage2_make_spec
  - title: Prospective runtime
    desc: Run individual stages or the complete weekly pipeline.
    contents:
      - load_prospective_kit
      - run_m0
      - run_m0_detection
      - run_m1
      - run_m1_alignment
      - run_m2
      - run_m2_forecast
      - run_pipeline
      - run_prospective_pipeline
  - title: Plotting and diagnostics
    contents:
      - starts_with("plot_")
      - plotRes
      - plotSeasonCurves
  - title: Lower-level M0, M1, and M2 helpers
    desc: Building blocks for advanced development and evaluation.
    contents:
      - matches("^(detect|flag|align|estimate|fit|forecast|nested|loso|stage2|m1_|m2_|peak_|run_alignment|learn_alignment|inject_m1)")
  - title: Internal and legacy topics
    desc: Compatibility helpers and implementation details.
    contents:
      - matches(".")
